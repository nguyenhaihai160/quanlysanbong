<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đặt Sân Bóng</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:20px;
}

h1{color:#27ae60}

input,select,button{
width:90%;
padding:12px;
margin:8px;
font-size:16px;
}

button{
background:#27ae60;
color:white;
border:none;
cursor:pointer;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

</style>
</head>

<body>

<div class="box">

<h1>⚽ Đặt Sân Bóng</h1>

<input type="date" id="date">

<select id="field">
<option>Sân 1</option>
<option>Sân 2</option>
<option>Sân 3</option>
</select>

<label>Giờ bắt đầu</label>
<input type="time" id="start">

<label>Giờ kết thúc</label>
<input type="time" id="end">

<input placeholder="Tên khách" id="name">

<input placeholder="Số điện thoại" id="phone">

<button onclick="book()">Đặt Sân</button>

<p id="msg"></p>

</div>


<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

// CẤU HÌNH FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBkBFNdREXKkpM-IgPg8g6c1C-CNRb7EoI",
  authDomain: "quanlysanbong-ae0ec.firebaseapp.com",
  databaseURL: "https://quanlysanbong-ae0ec-default-rtdb.firebaseio.com",
  projectId: "quanlysanbong-ae0ec",
  storageBucket: "quanlysanbong-ae0ec.appspot.com",
  messagingSenderId: "351867228844",
  appId: "1:351867228844:web:2ff782d295a9d28440c509"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let bookings=[]

// LẤY DỮ LIỆU REALTIME
db.ref("bookings").on("value",(snap)=>{

bookings=[]

snap.forEach((s)=>{
bookings.push(s.val())
})

})


// CHUYỂN GIỜ → PHÚT
function toMinutes(t){

let p=t.split(":")
return parseInt(p[0])*60+parseInt(p[1])

}


// ĐẶT SÂN
function book(){

let date=document.getElementById("date").value
let field=document.getElementById("field").value
let start=document.getElementById("start").value
let end=document.getElementById("end").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

if(!date || !start || !end || !name){
document.getElementById("msg").innerHTML="❌ Nhập đầy đủ thông tin"
return
}

// kiểm tra trùng giờ
for(let b of bookings){

if(
b.date===date &&
b.field===field &&
!(
toMinutes(end)<=toMinutes(b.start) ||
toMinutes(start)>=toMinutes(b.end)
)
){
document.getElementById("msg").innerHTML="❌ Sân đã có người đặt trong giờ này!"
return
}

}


// TẠO MÃ ĐẶT SÂN
let id="BK-"+Date.now()

let data={
id:id,
date:date,
field:field,
start:start,
end:end,
name:name,
phone:phone
}


// LƯU FIREBASE
db.ref("bookings/"+id).set(data)

document.getElementById("msg").innerHTML="✅ Đặt sân thành công!"

}

</script>

</body>
</html>
