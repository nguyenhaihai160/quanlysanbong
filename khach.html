<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đặt Sân Bóng</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:20px;
}

h1{color:#27ae60}

input,select,button{
width:90%;
padding:12px;
margin:8px;
font-size:16px;
}

button{
background:#27ae60;
color:white;
border:none;
cursor:pointer;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

</style>
</head>

<body>

<div class="box">

<h1>⚽ Đặt Sân Bóng</h1>

<input type="date" id="date">

<select id="field">
<option>Sân 1</option>
<option>Sân 2</option>
<option>Sân 3</option>
</select>

<label>Giờ bắt đầu</label>
<input type="time" id="start">

<label>Giờ kết thúc</label>
<input type="time" id="end">

<input placeholder="Tên khách" id="name">

<input placeholder="Số điện thoại" id="phone">

<button onclick="book()">Đặt Sân</button>

<p id="msg"></p>

</div>

<script>

function book(){

let date=document.getElementById("date").value
let field=document.getElementById("field").value
let start=document.getElementById("start").value
let end=document.getElementById("end").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

let bookings=JSON.parse(localStorage.getItem("bookings"))||[]

// kiểm tra trùng sân
for(let b of bookings){

if(
b.date===date &&
b.field===field &&
(
(start>=b.start && start<b.end) ||
(end>b.start && end<=b.end) ||
(start<=b.start && end>=b.end)
)
){
document.getElementById("msg").innerHTML="❌ Sân đã có người đặt trong giờ này!"
return
}

}

// tạo dữ liệu đặt sân
let data={
date:date,
field:field,
start:start,
end:end,
name:name,
phone:phone
}

// lưu
bookings.push(data)

localStorage.setItem("bookings",JSON.stringify(bookings))

document.getElementById("msg").innerHTML="✅ Đặt sân thành công!"

}

</script>

</body>
</html>
