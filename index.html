<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>QUẢN LÝ SÂN BÓNG</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:20px;
}

h1{color:#27ae60}

input,button,select{
padding:10px;
margin:5px;
}

button{
background:#27ae60;
color:white;
border:none;
cursor:pointer;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#2ecc71;
color:white;
}

.running{color:green;font-weight:bold}
.warning{color:orange;font-weight:bold}
.end{color:red;font-weight:bold}

.fieldBox{
display:inline-block;
width:150px;
padding:15px;
margin:10px;
border-radius:10px;
font-size:18px;
}

.free{
background:#d4edda;
color:#155724;
}

.busy{
background:#f8d7da;
color:#721c24;
}

.slotFree{background:#d4edda}
.slotBusy{background:#f8d7da}

</style>
</head>

<body>

<h1>⚽ QUẢN LÝ SÂN BÓNG</h1>

<h2>🏟 Trạng thái sân</h2>
<div id="fieldStatus"></div>

<hr>

<div>

<input type="date" id="date">

<input id="name" placeholder="Tên khách">

<input id="phone" placeholder="SĐT">

<select id="field">
<option>Sân 1</option>
<option>Sân 2</option>
<option>Sân 3</option>
</select>

<br>

<label>Bắt đầu</label>
<input type="time" id="start">

<label>Kết thúc</label>
<input type="time" id="end">

<br>

<button onclick="addBooking()">Đặt sân</button>

</div>

<h2>📅 Lịch sân</h2>

<table>

<thead>
<tr>
<th>Mã</th>
<th>Ngày</th>
<th>Sân</th>
<th>Khách</th>
<th>Bắt đầu</th>
<th>Kết thúc</th>
<th>Còn lại</th>
<th>SĐT</th>
<th>Tiền</th>
<th>Xóa</th>
</tr>
</thead>

<tbody id="schedule"></tbody>

</table>

<h2 id="revenue">Doanh thu: 0 VNĐ</h2>

<button onclick="exportExcel()">📥 Xuất Excel</button>

<hr>

<h2>🕒 Kiểm tra khung giờ sân</h2>

<table>

<thead>
<tr>
<th>Giờ</th>
<th>Sân 1</th>
<th>Sân 2</th>
<th>Sân 3</th>
</tr>
</thead>

<tbody id="timeSlots"></tbody>

</table>

<script>

let bookings=JSON.parse(localStorage.getItem("bookings"))||[]

let fields=["Sân 1","Sân 2","Sân 3"]

document.getElementById("date").valueAsDate=new Date()

function toMinutes(t){
let p=t.split(":")
return parseInt(p[0])*60+parseInt(p[1])
}

function generateBookingID(){

let d=new Date()

let date=
d.getFullYear()+
String(d.getMonth()+1).padStart(2,"0")+
String(d.getDate()).padStart(2,"0")

let count=bookings.length+1

return "SB-"+date+"-"+String(count).padStart(3,"0")
}

function getPrice(hour){

if(hour>=7 && hour<17) return 500000
return 300000

}

function calculateMoney(start,end){

let s=toMinutes(start)
let e=toMinutes(end)

let total=0

for(let m=s;m<e;m+=60){

let hour=Math.floor(m/60)

total+=getPrice(hour)

}

return total

}

function checkConflict(field,start,end,date){

let s=toMinutes(start)
let e=toMinutes(end)

for(let b of bookings){

if(b.field===field && b.date===date){

let bs=toMinutes(b.start)
let be=toMinutes(b.end)

if(!(e<=bs||s>=be)) return true

}

}

return false

}

function addBooking(){

let date=document.getElementById("date").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let field=document.getElementById("field").value
let start=document.getElementById("start").value
let end=document.getElementById("end").value

if(!date){alert("Chọn ngày");return}

if(toMinutes(end)<=toMinutes(start)){
alert("Giờ kết thúc phải lớn hơn")
return
}

if(checkConflict(field,start,end,date)){
alert("Khung giờ đã có người đặt")
return
}

let id=generateBookingID()

bookings.push({
id,date,name,phone,field,start,end
})

save()
render()

}

function render(){

let html=""
let total=0

let selectedDate=document.getElementById("date").value

let list=bookings.filter(b=>b.date===selectedDate)

list.forEach((b,i)=>{

let money=calculateMoney(b.start,b.end)

total+=money

let remain=getRemain(b)

html+=`

<tr>

<td>${b.id}</td>
<td>${b.date}</td>
<td>${b.field}</td>
<td>${b.name}</td>
<td>${b.start}</td>
<td>${b.end}</td>
<td>${remain}</td>
<td>${b.phone}</td>
<td>${money.toLocaleString()}</td>

<td>
<button onclick="deleteBooking('${b.id}')">X</button>
</td>

</tr>

`

})

document.getElementById("schedule").innerHTML=html

document.getElementById("revenue").innerText=
"Doanh thu: "+total.toLocaleString()+" VNĐ"

renderFieldStatus()
renderTimeTable()

}

function getRemain(b){

let now=new Date()

let nowMin=now.getHours()*60+now.getMinutes()

let end=toMinutes(b.end)
let start=toMinutes(b.start)

if(nowMin<start) return "Chưa đá"

let remain=end-nowMin

if(remain<=0) return "Hết giờ"

return remain+" phút"

}

function deleteBooking(id){

bookings=bookings.filter(b=>b.id!==id)

save()
render()

}

function renderFieldStatus(){

let date=document.getElementById("date").value

let html=""

fields.forEach(f=>{

let busy=bookings.find(b=>b.field==f && b.date==date)

if(busy){

html+=`<div class="fieldBox busy">${f}<br>🔴 Có lịch</div>`

}else{

html+=`<div class="fieldBox free">${f}<br>🟢 Trống</div>`

}

})

document.getElementById("fieldStatus").innerHTML=html

}

function renderTimeTable(){

let date=document.getElementById("date").value

let html=""

for(let h=6;h<=23;h++){

let start=h.toString().padStart(2,"0")+":00"
let end=(h+1).toString().padStart(2,"0")+":00"

html+=`<tr><td>${start}-${end}</td>`

fields.forEach(f=>{

let busy=bookings.find(b=>{

if(b.field!==f||b.date!==date) return false

let s=toMinutes(b.start)
let e=toMinutes(b.end)

let hs=toMinutes(start)
let he=toMinutes(end)

return !(he<=s||hs>=e)

})

if(busy){

html+=`<td class="slotBusy">Đã đặt</td>`

}else{

html+=`<td class="slotFree">Trống</td>`

}

})

html+="</tr>"

}

document.getElementById("timeSlots").innerHTML=html

}

function exportExcel(){

let date=document.getElementById("date").value

let list=bookings.filter(b=>b.date===date)

let data=list.map(b=>{

return{

Ma:b.id,
Ngay:b.date,
San:b.field,
Khach:b.name,
SDT:b.phone,
BatDau:b.start,
KetThuc:b.end,
Tien:calculateMoney(b.start,b.end)

}

})

let ws=XLSX.utils.json_to_sheet(data)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"DoanhThu")

XLSX.writeFile(wb,"doanh_thu_san.xlsx")

}

function save(){

localStorage.setItem("bookings",JSON.stringify(bookings))

}

document.getElementById("date").addEventListener("change",render)

setInterval(render,30000)

render()

</script>

</body>
</html>
