<script>

// KẾT NỐI FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBkBFNdREXKkpM-IgPg8g6c1C-CNRb7EoI",
  authDomain: "quanlysanbong-ae0ec.firebaseapp.com",
  databaseURL: "https://quanlysanbong-ae0ec-default-rtdb.firebaseio.com",
  projectId: "quanlysanbong-ae0ec",
  storageBucket: "quanlysanbong-ae0ec.appspot.com",
  messagingSenderId: "351867228844",
  appId: "1:351867228844:web:2ff782d295a9d28440c509"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();


// DỮ LIỆU BOOKING REALTIME
let bookings=[]

db.ref("bookings").on("value",(snap)=>{

bookings=[]

snap.forEach((s)=>{
bookings.push(s.val())
})

render()

})


let fields=["Sân 1","Sân 2","Sân 3"]

document.getElementById("date").valueAsDate=new Date()


function toMinutes(t){
let p=t.split(":")
return parseInt(p[0])*60+parseInt(p[1])
}


function generateBookingID(){

let d=new Date()

let date=
d.getFullYear()+
String(d.getMonth()+1).padStart(2,"0")+
String(d.getDate()).padStart(2,"0")

let count=Date.now()

return "SB-"+date+"-"+count
}


function getPrice(hour){

if(hour>=7 && hour<17) return 500000
return 300000

}


function calculateMoney(start,end){

let s=toMinutes(start)
let e=toMinutes(end)

let total=0

for(let m=s;m<e;m+=60){

let hour=Math.floor(m/60)

total+=getPrice(hour)

}

return total

}


function checkConflict(field,start,end,date){

let s=toMinutes(start)
let e=toMinutes(end)

for(let b of bookings){

if(b.field===field && b.date===date){

let bs=toMinutes(b.start)
let be=toMinutes(b.end)

if(!(e<=bs||s>=be)) return true

}

}

return false

}


function addBooking(){

let date=document.getElementById("date").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let field=document.getElementById("field").value
let start=document.getElementById("start").value
let end=document.getElementById("end").value

if(!date){alert("Chọn ngày");return}

if(toMinutes(end)<=toMinutes(start)){
alert("Giờ kết thúc phải lớn hơn")
return
}

if(checkConflict(field,start,end,date)){
alert("Khung giờ đã có người đặt")
return
}

let id=generateBookingID()

let booking={
id,date,name,phone,field,start,end
}

// LƯU FIREBASE
db.ref("bookings/"+id).set(booking)

}


function deleteBooking(id){

db.ref("bookings/"+id).remove()

}


function render(){

let html=""
let total=0

let selectedDate=document.getElementById("date").value

let list=bookings.filter(b=>b.date===selectedDate)

list.forEach((b)=>{

let money=calculateMoney(b.start,b.end)

total+=money

let remain=getRemain(b)

html+=`

<tr>

<td>${b.id}</td>
<td>${b.date}</td>
<td>${b.field}</td>
<td>${b.name}</td>
<td>${b.start}</td>
<td>${b.end}</td>
<td>${remain}</td>
<td>${b.phone}</td>
<td>${money.toLocaleString()}</td>

<td>
<button onclick="deleteBooking('${b.id}')">X</button>
</td>

</tr>

`

})

document.getElementById("schedule").innerHTML=html

document.getElementById("revenue").innerText=
"Doanh thu: "+total.toLocaleString()+" VNĐ"

renderFieldStatus()
renderTimeTable()

}


function getRemain(b){

let now=new Date()

let nowMin=now.getHours()*60+now.getMinutes()

let end=toMinutes(b.end)
let start=toMinutes(b.start)

if(nowMin<start) return "Chưa đá"

let remain=end-nowMin

if(remain<=0) return "Hết giờ"

return remain+" phút"

}


function renderFieldStatus(){

let date=document.getElementById("date").value

let html=""

fields.forEach(f=>{

let busy=bookings.find(b=>b.field==f && b.date==date)

if(busy){

html+=`<div class="fieldBox busy">${f}<br>🔴 Có lịch</div>`

}else{

html+=`<div class="fieldBox free">${f}<br>🟢 Trống</div>`

}

})

document.getElementById("fieldStatus").innerHTML=html

}


function renderTimeTable(){

let date=document.getElementById("date").value

let html=""

for(let h=6;h<=23;h++){

let start=h.toString().padStart(2,"0")+":00"
let end=(h+1).toString().padStart(2,"0")+":00"

html+=`<tr><td>${start}-${end}</td>`

fields.forEach(f=>{

let busy=bookings.find(b=>{

if(b.field!==f||b.date!==date) return false

let s=toMinutes(b.start)
let e=toMinutes(b.end)

let hs=toMinutes(start)
let he=toMinutes(end)

return !(he<=s||hs>=e)

})

if(busy){

html+=`<td class="slotBusy">Đã đặt</td>`

}else{

html+=`<td class="slotFree">Trống</td>`

}

})

html+="</tr>"

}

document.getElementById("timeSlots").innerHTML=html

}

document.getElementById("date").addEventListener("change",render)

</script>
