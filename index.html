<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>QUẢN LÝ SÂN</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:20px;
}

h1{color:#27ae60}

table{
width:95%;
margin:auto;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#2ecc71;
color:white;
}

</style>

</head>

<body>

<h1>⚽ QUẢN LÝ SÂN BÓNG</h1>

<table>

<thead>
<tr>

<th>ID</th>
<th>Ngày</th>
<th>Sân</th>
<th>Khách</th>
<th>Bắt đầu</th>
<th>Kết thúc</th>
<th>SĐT</th>

</tr>
</thead>

<tbody id="schedule"></tbody>

</table>

<script>

const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB_URL",
projectId:"YOUR_PROJECT"
}

firebase.initializeApp(firebaseConfig)

let db=firebase.database()

db.ref("bookings").on("value",(snap)=>{

let html=""

snap.forEach(d=>{

let b=d.val()

html+=`

<tr>

<td>${d.key}</td>
<td>${b.date}</td>
<td>${b.field}</td>
<td>${b.name}</td>
<td>${b.start}</td>
<td>${b.end}</td>
<td>${b.phone}</td>

</tr>

`

})

document.getElementById("schedule").innerHTML=html

})

</script>

</body>
</html>
