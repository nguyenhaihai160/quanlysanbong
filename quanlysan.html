<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>QUẢN LÝ SÂN BÓNG</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:20px;
}

h1{color:#27ae60}

input,button,select{
padding:10px;
margin:5px;
}

button{
background:#27ae60;
color:white;
border:none;
cursor:pointer;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#2ecc71;
color:white;
}

.running{color:green;font-weight:bold}
.warning{color:orange;font-weight:bold}
.end{color:red;font-weight:bold}

.fieldBox{
display:inline-block;
width:150px;
padding:15px;
margin:10px;
border-radius:10px;
font-size:18px;
}

.free{
background:#d4edda;
color:#155724;
}

.busy{
background:#f8d7da;
color:#721c24;
}

</style>
</head>

<body>

<h1>⚽ QUẢN LÝ SÂN BÓNG</h1>

<h2>🏟 Trạng thái sân</h2>
<div id="fieldStatus"></div>

<hr>

<div>

<input type="date" id="date">

<input id="name" placeholder="Tên khách">

<input id="phone" placeholder="SĐT">

<select id="field">
<option>Sân 1</option>
<option>Sân 2</option>
<option>Sân 3</option>
</select>

<br>

<label>Bắt đầu</label>
<input type="time" id="start">

<label>Kết thúc</label>
<input type="time" id="end">

<br>

<button onclick="addBooking()">Đặt sân</button>

</div>

<h2>📅 Lịch sân</h2>

<table>

<thead>
<tr>
<th>Mã</th>
<th>Ngày</th>
<th>Sân</th>
<th>Khách</th>
<th>Bắt đầu</th>
<th>Kết thúc</th>
<th>Còn lại</th>
<th>SĐT</th>
<th>Tiền</th>
<th>Xóa</th>
</tr>
</thead>

<tbody id="schedule"></tbody>

</table>

<h2 id="revenue">Doanh thu: 0 VNĐ</h2>

<script>

let bookings=JSON.parse(localStorage.getItem("bookings"))||[]

let fields=["Sân 1","Sân 2","Sân 3"]

let alarmPlayed={}

document.getElementById("date").valueAsDate=new Date()

function toMinutes(t){

let p=t.split(":")
return parseInt(p[0])*60+parseInt(p[1])

}

function generateBookingID(){

let d=new Date()

let date=
d.getFullYear()+
String(d.getMonth()+1).padStart(2,"0")+
String(d.getDate()).padStart(2,"0")

let count=bookings.length+1

return "SB-"+date+"-"+String(count).padStart(3,"0")

}

function getPrice(hour){

if(hour>=7 && hour<17) return 500000
return 300000

}

function calculateMoney(start,end){

let s=toMinutes(start)
let e=toMinutes(end)

let total=0

for(let m=s;m<e;m+=60){

let hour=Math.floor(m/60)

total+=getPrice(hour)

}

return total

}

function playAlarm(){

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg")

audio.play()

}

function checkConflict(field,start,end,date){

let s=toMinutes(start)
let e=toMinutes(end)

for(let b of bookings){

if(b.field===field && b.date===date){

let bs=toMinutes(b.start)
let be=toMinutes(b.end)

if(!(e<=bs||s>=be)) return true

}

}

return false

}

function addBooking(){

let date=document.getElementById("date").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let field=document.getElementById("field").value
let start=document.getElementById("start").value
let end=document.getElementById("end").value

if(!date){alert("Chọn ngày");return}
if(name==""){alert("Nhập tên khách");return}
if(phone==""){alert("Nhập SĐT");return}

if(toMinutes(end)<=toMinutes(start)){
alert("Giờ kết thúc phải lớn hơn giờ bắt đầu")
return
}

if(checkConflict(field,start,end,date)){
alert("Khung giờ đã có người đặt")
return
}

let id=generateBookingID()

bookings.push({
id,
date,
name,
phone,
field,
start,
end
})

save()

render()

}

function remainingTime(date,end,field){

let now=new Date()

let endTime=new Date(date+" "+end)

let diff=endTime-now

if(diff<=0){

if(!alarmPlayed[field]){
playAlarm()
alarmPlayed[field]=true
}

return {text:"Hết giờ",class:"end"}

}

let m=Math.floor(diff/60000)
let s=Math.floor((diff%60000)/1000)

if(m<=10) return {text:m+"m "+s+"s",class:"warning"}

return {text:m+"m "+s+"s",class:"running"}

}

function renderFieldStatus(){

let now=new Date()

let date=document.getElementById("date").value

let html=""

fields.forEach(f=>{

let active=bookings.find(b=>{

if(b.field!==f||b.date!==date) return false

let start=new Date(b.date+" "+b.start)
let end=new Date(b.date+" "+b.end)

return now>=start && now<=end

})

if(active){

let remain=remainingTime(active.date,active.end,f)

html+=`
<div class="fieldBox busy">
${f}<br>
🔴 Đang đá<br>
${remain.text}
</div>
`

}else{

html+=`
<div class="fieldBox free">
${f}<br>
🟢 Trống
</div>
`

}

})

document.getElementById("fieldStatus").innerHTML=html

}

function render(){

let html=""
let total=0

let selectedDate=document.getElementById("date").value

let list=bookings.filter(b=>b.date===selectedDate)

list.sort((a,b)=>toMinutes(a.start)-toMinutes(b.start))

list.forEach((b,i)=>{

let money=calculateMoney(b.start,b.end)

total+=money

let remain=remainingTime(b.date,b.end,b.field)

html+=`

<tr>

<td>${b.id}</td>
<td>${b.date}</td>
<td>${b.field}</td>
<td>${b.name}</td>
<td>${b.start}</td>
<td>${b.end}</td>
<td class="${remain.class}">${remain.text}</td>
<td>${b.phone}</td>
<td>${money.toLocaleString()} VNĐ</td>

<td>
<button onclick="deleteBooking(${i})">X</button>
</td>

</tr>

`

})

document.getElementById("schedule").innerHTML=html

document.getElementById("revenue").innerText=
"Doanh thu: "+total.toLocaleString()+" VNĐ"

renderFieldStatus()

}

function deleteBooking(i){

let selectedDate=document.getElementById("date").value

let list=bookings.filter(b=>b.date===selectedDate)

let target=list[i]

let index=bookings.indexOf(target)

if(index>-1){

bookings.splice(index,1)

save()

render()

}

}

function save(){

localStorage.setItem("bookings",JSON.stringify(bookings))

}

document.getElementById("date").addEventListener("change",render)

setInterval(render,1000)

render()

</script>

</body>
</html>
